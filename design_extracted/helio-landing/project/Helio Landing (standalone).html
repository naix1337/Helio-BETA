  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

im:      #677082;\n\n  --primary:           #2EE0CE;\n  --primary-hover:     #54ead9;\n  --primary-soft:      rgba(46,224,206,0.12);\n  --primary-fg:        #042220;\n  --primary-glow:      rgba(46,224,206,0.32);\n\n  --violet:        #9C8CFA;\n  --violet-soft:   rgba(156,140,250,0.14);\n\n  --ok:    #36D399;\n  --warn:  #F7C948;\n  --down:  #F76C6C;\n\n  --ok-soft:   rgba(54,211,153,0.14);\n  --warn-soft: rgba(247,201,72,0.14);\n  --down-soft: rgba(247,108,108,0.14);\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-md: 0 12px 40px -12px rgba(0,0,0,0.6);\n  --shadow-lg: 0 40px 120px -30px rgba(0,0,0,0.75);\n\n  --nav-bg: rgba(11,14,20,0.72);\n\n  --grid-line: rgba(255,255,255,0.045);\n\n  --font-sans: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  --radius-sm: 6px;\n  --radius:    10px;\n  --radius-lg: 16px;\n  --radius-xl: 22px;\n\n  --maxw: 1200px;\n  --gut: clamp(20px, 5vw, 40px);\n\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n/* ============================================================\n   TOKENS — Light\n   ============================================================ */\n[data-theme=\"light\"] {\n  --bg:            #FBFCFE;\n  --bg-soft:       #F4F7FA;\n  --surface:       #FFFFFF;\n  --surface-2:     #F6F8FB;\n  --surface-3:     #EEF2F7;\n\n  --border:        rgba(13,20,33,0.10);\n  --border-strong: rgba(13,20,33,0.17);\n\n  --text:          #0D1420;\n  --text-muted:    #56627A;\n  --text-dim:      #8A93A6;\n\n  --primary:           #0C9C8D;\n  --primary-hover:     #0AA597;\n  --primary-soft:      rgba(12,156,141,0.10);\n  --primary-fg:        #FFFFFF;\n  --primary-glow:      rgba(12,156,141,0.22);\n\n  --violet:        #6F58E8;\n  --violet-soft:   rgba(111,88,232,0.10);\n\n  --ok:    #11A86F;\n  --warn:  #C98A06;\n  --down:  #DB4A4A;\n\n  --ok-soft:   rgba(17,168,111,0.12);\n  --warn-soft: rgba(201,138,6,0.12);\n  --down-soft: rgba(219,74,74,0.12);\n\n  --shadow-sm: 0 1px 2px rgba(13,20,33,0.06);\n  --shadow-md: 0 14px 40px -16px rgba(13,20,33,0.16);\n  --shadow-lg: 0 40px 120px -36px rgba(13,20,33,0.22);\n\n  --nav-bg: rgba(251,252,254,0.78);\n\n  --grid-line: rgba(13,20,33,0.05);\n}\n\nbody {\n  background: var(--bg);\n  color: var(--text);\n  font-family: var(--font-sans);\n  font-size: 16px;\n  transition: background-color 0.4s var(--ease), color 0.4s var(--ease);\n}\n\n/* ============================================================\n   TYPE SCALE\n   ============================================================ */\nh1, h2, h3, h4 { line-height: 1.08; letter-spacing: -0.02em; font-weight: 650; color: var(--text); }\n.display { font-size: clamp(2.6rem, 6vw, 4.4rem); font-weight: 680; letter-spacing: -0.03em; line-height: 1.02; }\n.h2 { font-size: clamp(1.9rem, 3.6vw, 2.9rem); letter-spacing: -0.025em; }\n.h3 { font-size: 1.25rem; letter-spacing: -0.015em; }\n.lead { font-size: clamp(1.05rem, 1.6vw, 1.22rem); color: var(--text-muted); line-height: 1.6; }\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 0.78rem; font-weight: 500;\n  letter-spacing: 0.12em; text-transform: uppercase;\n  color: var(--primary);\n  display: inline-flex; align-items: center; gap: 8px;\n}\n.eyebrow::before { content: \"\"; width: 22px; height: 1px; background: var(--primary); opacity: 0.6; }\n.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }\n\n/* ============================================================\n   LAYOUT\n   ============================================================ */\n.container { width: 100%; max-width: var(--maxw); margin-inline: auto; padding-inline: var(--gut); }\nsection { position: relative; }\n.section-pad { padding-block: clamp(72px, 11vw, 130px); }\n.divider { border-top: 1px solid var(--border); }\n\n.section-head { max-width: 660px; margin-bottom: clamp(40px, 6vw, 64px); }\n.section-head.center { margin-inline: auto; text-align: center; }\n.section-head.center .eyebrow { justify-content: center; }\n.section-head .h2 { margin-top: 16px; }\n.section-head .lead { margin-top: 18px; }\n\n/* ============================================================\n   BUTTONS\n   ============================================================ */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 9px;\n  font-weight: 540; font-size: 0.95rem; letter-spacing: -0.01em;\n  padding: 0 20px; height: 46px;\n  border-radius: var(--radius); border: 1px solid transparent;\n  cursor: pointer; white-space: nowrap;\n  transition: background-color .17s var(--ease), border-color .17s var(--ease),\n              color .17s var(--ease), transform .17s var(--ease), box-shadow .17s var(--ease);\n}\n.btn:active { transform: translateY(1px); }\n.btn svg { width: 18px; height: 18px; }\n\n.btn-primary {\n  background: var(--primary); color: var(--primary-fg);\n  box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 24px -10px var(--primary-glow);\n}\n.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 0 0 4px var(--primary-soft), 0 10px 30px -10px var(--primary-glow); }\n\n.btn-secondary {\n  background: transparent; color: var(--text);\n  border-color: var(--border-strong);\n}\n.btn-secondary:hover { background: var(--surface-2); border-color: var(--text-dim); }\n\n.btn-ghost { background: transparent; color: var(--text-muted); padding-inline: 14px; }\n.btn-ghost:hover { color: var(--text); background: var(--surface-2); }\n\n.btn-sm { height: 38px; font-size: 0.88rem; padding-inline: 15px; }\n.btn-lg { height: 52px; font-size: 1.02rem; padding-inline: 26px; }\n\n/* ============================================================\n   BADGES\n   ============================================================ */\n.badge {\n  display: inline-flex; align-items: center; gap: 7px;\n  font-family: var(--font-mono); font-size: 0.74rem; font-weight: 500;\n  padding: 4px 10px; border-radius: 100px;\n  border: 1px solid var(--border); background: var(--surface-2);\n  color: var(--text-muted); letter-spacing: 0.01em;\n}\n.badge .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }\n.dot-ok   { background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }\n.dot-warn { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-soft); }\n.dot-down { background: var(--down); box-shadow: 0 0 0 3px var(--down-soft); }\n\n.badge-status.ok   { color: var(--ok); border-color: var(--ok-soft); background: var(--ok-soft); }\n.badge-status.warn { color: var(--warn); border-color: var(--warn-soft); background: var(--warn-soft); }\n.badge-status.down { color: var(--down); border-color: var(--down-soft); background: var(--down-soft); }\n\n.pulse { position: relative; }\n.pulse::after {\n  content: \"\"; position: absolute; inset: -3px; border-radius: 50%;\n  border: 1px solid currentColor; opacity: 0.6;\n  animation: pulse-ring 2.4s var(--ease) infinite;\n}\n@keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.7; } 80%,100% { transform: scale(2.4); opacity: 0; } }\n\n/* ============================================================\n   NAVBAR\n   ============================================================ */\n.nav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n  transition: background-color .3s var(--ease), border-color .3s var(--ease), backdrop-filter .3s;\n  border-bottom: 1px solid transparent;\n}\n.nav.scrolled {\n  background: var(--nav-bg);\n  -webkit-backdrop-filter: saturate(150%) blur(14px);\n  backdrop-filter: saturate(150%) blur(14px);\n  border-bottom-color: var(--border);\n}\n.nav-inner { display: flex; align-items: center; gap: 28px; height: 70px; }\n.brand { display: flex; align-items: center; gap: 11px; font-weight: 640; font-size: 1.12rem; letter-spacing: -0.02em; }\n.brand-mark {\n  width: 30px; height: 30px; border-radius: 9px; flex: none; position: relative;\n  background: radial-gradient(circle at 30% 28%, var(--primary), #0e7d72 78%);\n  box-shadow: 0 0 0 1px var(--border-strong), 0 6px 18px -6px var(--primary-glow);\n}\n.brand-mark::after {\n  content: \"\"; position: absolute; inset: 8px; border-radius: 50%;\n  border: 2px solid rgba(255,255,255,0.85); border-right-color: transparent; border-bottom-color: transparent;\n  transform: rotate(45deg);\n}\n.nav-links { display: flex; align-items: center; gap: 4px; margin-inline: auto; }\n.nav-links a {\n  color: var(--text-muted); font-size: 0.93rem; font-weight: 480;\n  padding: 8px 13px; border-radius: 8px; transition: color .15s, background-color .15s;\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.nav-links a:hover { color: var(--text); background: var(--surface-2); }\n.nav-links a svg { width: 15px; height: 15px; }\n.nav-actions { display: flex; align-items: center; gap: 8px; }\n\n.theme-toggle {\n  width: 40px; height: 40px; border-radius: 9px; flex: none;\n  display: grid; place-items: center; cursor: pointer;\n  background: transparent; border: 1px solid var(--border);\n  color: var(--text-muted); transition: all .15s;\n}\n.theme-toggle:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }\n.theme-toggle svg { width: 18px; height: 18px; }\n.theme-toggle .icon-sun { display: none; }\n[data-theme=\"light\"] .theme-toggle .icon-sun { display: block; }\n[data-theme=\"light\"] .theme-toggle .icon-moon { display: none; }\n\n.burger { display: none; width: 40px; height: 40px; border-radius: 9px; border: 1px solid var(--border);\n  background: transparent; color: var(--text); cursor: pointer; place-items: center; }\n.burger svg { width: 20px; height: 20px; }\n\n/* mobile menu */\n.mobile-menu {\n  position: fixed; inset: 70px 0 auto 0; z-index: 99;\n  background: var(--nav-bg); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);\n  border-bottom: 1px solid var(--border);\n  padding: 16px var(--gut) 26px;\n  display: none; flex-direction: column; gap: 4px;\n  transform: translateY(-12px); opacity: 0; transition: opacity .22s var(--ease), transform .22s var(--ease);\n}\n.mobile-menu.open { display: flex; transform: none; opacity: 1; }\n.mobile-menu a { padding: 13px 12px; border-radius: 9px; color: var(--text); font-weight: 480; font-size: 1.02rem; border-bottom: 1px solid var(--border); }\n.mobile-menu a:last-of-type { border-bottom: none; }\n.mobile-menu .btn { margin-top: 14px; width: 100%; }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero { padding-top: 150px; overflow: hidden; }\n.hero-bg {\n  position: absolute; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;\n  background:\n    radial-gradient(60% 50% at 50% -6%, var(--primary-soft), transparent 70%),\n    linear-gradient(transparent, transparent);\n}\n.hero-bg::before {\n  content: \"\"; position: absolute; inset: 0;\n  background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);\n  background-size: 54px 54px;\n  -webkit-mask-image: radial-gradient(70% 60% at 50% 18%, #000 0%, transparent 78%);\n  mask-image: radial-gradient(70% 60% at 50% 18%, #000 0%, transparent 78%);\n}\n.hero-inner { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 26px; }\n.gh-pill {\n  display: inline-flex; align-items: center; gap: 0;\n  border: 1px solid var(--border); border-radius: 100px; background: var(--surface);\n  font-size: 0.82rem; overflow: hidden; box-shadow: var(--shadow-sm);\n}\n.gh-pill .gh-l { display: flex; align-items: center; gap: 7px; padding: 6px 13px; color: var(--text-muted); }\n.gh-pill .gh-l svg { width: 15px; height: 15px; }\n.gh-pill .gh-r { display: flex; align-items: center; gap: 6px; padding: 6px 13px; border-left: 1px solid var(--border);\n  color: var(--text); font-family: var(--font-mono); font-weight: 500; background: var(--surface-2); }\n.gh-pill .gh-r svg { width: 14px; height: 14px; color: var(--warn); }\n.hero h1 { max-width: 16ch; }\n.hero h1 .accent { color: var(--primary); }\n.hero .lead { max-width: 56ch; }\n.hero-cta { display: flex; gap: 13px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }\n.hero-note { font-size: 0.83rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }\n.hero-note svg { width: 15px; height: 15px; color: var(--ok); }\n\n/* ---------- Dashboard mockup ---------- */\n.mockup-wrap { width: 100%; max-width: 1020px; margin-top: 30px; perspective: 1800px; }\n.mockup {\n  border: 1px solid var(--border-strong); border-radius: var(--radius-lg);\n  background: var(--surface); box-shadow: var(--shadow-lg);\n  overflow: hidden; text-align: left;\n}\n.mockup-bar {\n  display: flex; align-items: center; gap: 12px; padding: 12px 16px;\n  border-bottom: 1px solid var(--border); background: var(--surface-2);\n}\n.traffic { display: flex; gap: 7px; }\n.traffic i { width: 11px; height: 11px; border-radius: 50%; background: var(--surface-3); border: 1px solid var(--border-strong); }\n.mockup-url {\n  flex: 1; max-width: 320px; font-family: var(--font-mono); font-size: 0.74rem; color: var(--text-dim);\n  background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 5px 12px;\n  display: flex; align-items: center; gap: 7px;\n}\n.mockup-url svg { width: 12px; height: 12px; color: var(--ok); }\n.mockup-body { display: grid; grid-template-columns: 200px 1fr; min-height: 380px; }\n.mock-side { border-right: 1px solid var(--border); padding: 16px 12px; background: var(--bg-soft); display: flex; flex-direction: column; gap: 3px; }\n.mock-side .si {\n  display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 8px;\n  font-size: 0.85rem; color: var(--text-muted);\n}\n.mock-side .si svg { width: 16px; height: 16px; }\n.mock-side .si.active { background: var(--primary-soft); color: var(--primary); font-weight: 500; }\n.mock-side .si-label { font-family: var(--font-mono); font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); padding: 14px 11px 6px; }\n.mock-main { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }\n.mock-h { display: flex; align-items: center; justify-content: space-between; }\n.mock-h h4 { font-size: 1.05rem; }\n.mock-h .sub { font-size: 0.78rem; color: var(--text-dim); font-family: var(--font-mono); }\n.mock-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }\n.stat-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; background: var(--surface-2); }\n.stat-card .lbl { font-size: 0.72rem; color: var(--text-dim); display: flex; align-items: center; justify-content: space-between; }\n.stat-card .lbl .t { color: var(--ok); font-family: var(--font-mono); }\n.stat-card .lbl .t.up { color: var(--ok); }\n.stat-card .val { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 600; margin-top: 6px; letter-spacing: -0.02em; }\n.stat-card .val small { font-size: 0.8rem; color: var(--text-dim); font-weight: 400; }\n.spark { margin-top: 8px; }\n.bars { display: flex; align-items: flex-end; gap: 4px; height: 38px; margin-top: 10px; }\n.bars i { flex: 1; background: var(--violet); border-radius: 2px 2px 0 0; opacity: 0.85; }\n.mock-servers { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }\n.srow { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 14px;\n  padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 0.83rem; }\n.srow:last-child { border-bottom: none; }\n.srow .name { display: flex; align-items: center; gap: 9px; font-weight: 460; }\n.srow .name .nm { font-family: var(--font-mono); font-size: 0.78rem; }\n.srow .meta { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); }\n\n/* ============================================================\n   TRUS omplett self-hosted, Open Source und ohne Cloud-Zwang. Metriken, Alerting und Status-Pages in einem schlanken Binary.<\u002Fp>\n    <div class=\"hero-cta reveal d3\">\n      <a href=\"#start\" class=\"btn btn-primary btn-lg\">Kostenlos hosten<\u002Fa>\n      <a href=\"#demo\" class=\"btn btn-secondary btn-lg\"><i data-lucide=\"play\"><\u002Fi>Demo ansehen<\u002Fa>\n    <\u002Fdiv>\n    <p class=\"hero-note reveal d3\"><i data-lucide=\"check-circle-2\"><\u002Fi>Ein Binary · keine Datenbank nötig · in unter 60 Sekunden live<\u002Fp>\n\n    <!-- Dashboard mockup -->\n    <div class=\"mockup-wrap reveal d4\">\n      <div class=\"mockup\">\n        <div class=\"mockup-bar\">\n          <span class=\"traffic\" aria-hidden=\"true\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n          <span class=\"mockup-url\"><i data-lucide=\"lock\"><\u002Fi>helio.dein-server.de/dashboard<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mockup-body\">\n          <aside class=\"mock-side\">\n            <div class=\"si active\"><i data-lucide=\"layout-dashboard\"><\u002Fi>Übersicht<\u002Fdiv>\n            <div class=\"si\"><i data-lucide=\"server\"><\u002Fi>Nodes<\u002Fdiv>\n            <div class=\"si\"><i data-lucide=\"box\"><\u002Fi>Container<\u002Fdiv>\n            <div class=\"si\"><i data-lucide=\"bell\"><\u002Fi>Alerts<\u002Fdiv>\n            <div class=\"si\"><i data-lucide=\"activity\"><\u002Fi>Status-Page<\u002Fdiv>\n            <div class=\"si-label\">System<\u002Fdiv>\n            <div class=\"si\"><i data-lucide=\"settings\"><\u002Fi>Einstellungen<\u002Fdiv>\n            <div class=\"si\"><i data-lucide=\"users\"><\u002Fi>Team<\u002Fdiv>\n          <\u002Faside>\n          <div class=\"mock-main\">\n            <div class=\"mock-h\">\n              <h4>Übersicht<\u002Fh4>\n              <span class=\"sub\">Letzte 24 h · live<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"mock-stats\">\n              <div class=\"stat-card\">\n                <div class=\"lbl\"><span>CPU-Auslastung<\u002Fspan><span class=\"t up\">↘ 4,2 %<\u002Fspan><\u002Fdiv>\n                <div class=\"val\">37,4<small> %<\u002Fsmall><\u002Fdiv>\n                <svg class=\"spark\" viewBox=\"0 0 280 56\" preserveAspectRatio=\"none\" width=\"100%\" height=\"48\" aria-hidden=\"true\">\n                  <defs><linearGradient id=\"g1\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                    <stop offset=\"0\" stop-color=\"var(--primary)\" stop-opacity=\"0.35\"><\u002Fstop>\n                    <stop offset=\"1\" stop-color=\"var(--primary)\" stop-opacity=\"0\"><\u002Fstop>\n                  <\u002FlinearGradient><\u002Fdefs>\n                  <path d=\"M0,40 L24,36 48,42 72,30 96,33 120,22 144,28 168,18 192,26 216,14 240,20 264,12 280,16 L280,56 L0,56 Z\" fill=\"url(#g1)\"><\u002Fpath>\n                  <path d=\"M0,40 L24,36 48,42 72,30 96,33 120,22 144,28 168,18 192,26 216,14 240,20 264,12 280,16\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath>\n                <\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"stat-card\">\n                <div class=\"lbl\"><span>Arbeitsspeicher<\u002Fspan><span class=\"t\">12,1 / 32 GB<\u002Fspan><\u002Fdiv>\n                <div class=\"val\">38<small> %<\u002Fsmall><\u002Fdiv>\n                <div class=\"bars\" aria-hidden=\"true\">\n                  <i style=\"height:42%\"><\u002Fi><i style=\"height:55%\"><\u002Fi><i style=\"height:48%\"><\u002Fi><i style=\"height:67%\"><\u002Fi>\n                  <i style=\"height:60%\"><\u002Fi><i style=\"height:72%\"><\u002Fi><i style=\"height:51%\"><\u002Fi><i style=\"height:80%\"><\u002Fi>\n                  <i style=\"height:64%\"><\u002Fi><i style=\"height:58%\"><\u002Fi><i style=\"height:74%\"><\u002Fi><i style=\"height:46%\"><\u002Fi>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"mock-servers\">\n              <div class=\"srow\">\n                <span class=\"name\"><span class=\"dot dot-ok pulse\" style=\"color:var(--ok)\"><\u002Fspan><span class=\"nm\">web-01<\u002Fspan><\u002Fspan>\n                <span class=\"meta\">99,99 % SLA<\u002Fspan>\n                <span class=\"meta\" data-jitter=\"24\">24ms<\u002Fspan>\n                <span class=\"badge badge-status ok\">online<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"srow\">\n                <span class=\"name\"><span class=\"dot dot-ok\" style=\"color:var(--ok)\"><\u002Fspan><span class=\"nm\">db-primary<\u002Fspan><\u002Fspan>\n                <span class=\"meta\">99,97 % SLA<\u002Fspan>\n                <span class=\"meta\" data-jitter=\"11\">11ms<\u002Fspan>\n                <span class=\"badge badge-status ok\">online<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"srow\">\n                <span class=\"name\"><span class=\"dot dot-warn\" style=\"color:var(--warn)\"><\u002Fspan><span class=\"nm\">cache-02<\u002Fspan><\u002Fspan>\n                <span class=\"meta\">98,40 % SLA<\u002Fspan>\n                <span class=\"meta\" data-jitter=\"86\">86ms<\u002Fspan>\n                <span class=\"badge badge-status warn\">latenz<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"srow\">\n                <span class=\"name\"><span class=\"dot dot-ok\" style=\"color:var(--ok)\"><\u002Fspan><span class=\"nm\">worker-eu-1<\u002Fspan><\u002Fspan>\n                <span class=\"meta\">99,95 % SLA<\u002Fspan>\n                <span class=\"meta\" data-jitter=\"32\">32ms<\u002Fspan>\n                <span class=\"badge badge-status ok\">online<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== TRUSTED BY ===================== -->\n<section class=\"trusted divider\">\n  <div class=\"container\">\n    <p class=\"reveal\">Vertraut von Homelabs &amp; Teams weltweit<\u002Fp>\n    <div class=\"logo-row reveal d1\">\n      <span class=\"logo-ph\"><span class=\"lm circle\"><\u002Fspan>Nimbus<\u002Fspan>\n      <span class=\"logo-ph\"><span class=\"lm\"><\u002Fspan>Forgelab<\u002Fspan>\n      <span class=\"logo-ph\"><span class=\"lm diamond\"><\u002Fspan>Octa­Hosting<\u002Fspan>\n      <span class=\"logo-ph\"><span class=\"lm circle\"><\u002Fspan>kern.io<\u002Fspan>\n      <span class=\"logo-ph\"><span class=\"lm\"><\u002Fspan>Stratus<\u002Fspan>\n      <span class=\"logo-ph\"><span class=\"lm diamond\"><\u002Fspan>HomeRack<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FEATURES ===================== -->\n<section class=\"section-pad divider\" id=\"features\">\n  <div class=\"container\">\n    <div class=\"section-head center\">\n      <span class=\"eyebrow reveal\">Funktionen<\u002Fspan>\n      <h2 class=\"h2 reveal d1\">Alles, was du zum Überwachen brauchst<\u002Fh2>\n      <p class=\"lead reveal d2\">Ein einziges Tool für Metriken, Alarme und Transparenz — ohne fünf verschiedene Dienste zusammenzukleben.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <article class=\"feat-card reveal\">\n        <div class=\"feat-ico\"><i data-lucide=\"line-chart\"><\u002Fi><\u002Fdiv>\n        <h3 class=\"h3\">Echtzeit-Metriken<\u002Fh3>\n        <p>CPU, RAM, Disk, Netzwerk und I/O im Sekundentakt. Sauber gerenderte Charts mit historischen Daten und frei wählbaren Zeitfenstern.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"feat-card reveal d1\">\n        <div class=\"feat-ico\"><i data-lucide=\"bell-ring\"><\u002Fi><\u002Fdiv>\n        <h3 class=\"h3\">Alerting<\u002Fh3>\n        <p>Regelbasierte Alarme per Webhook, E-Mail, Slack oder Discord. Definiere Schwellwerte, Eskalationen und Ruhezeiten exakt nach Bedarf.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"feat-card v reveal d2\">\n        <div class=\"feat-ico\"><i data-lucide=\"container\"><\u002Fi><\u002Fdiv>\n        <h3 class=\"h3\">Docker-Integration<\u002Fh3>\n        <p>Container werden automatisch erkannt. Pro-Container-Metriken, Logs und Health-Checks — ganz ohne manuelle Konfiguration.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"feat-card reveal\">\n        <div class=\"feat-ico\"><i data-lucide=\"shield-check\"><\u002Fi><\u002Fdiv>\n        <h3 class=\"h3\">Self-Hosted &amp; Privacy-First<\u002Fh3>\n        <p>Deine Daten verlassen nie deinen Server. Keine Telemetrie, keine Account-Pflicht, keine Cloud-Abhängigkeit — du behältst die Kontrolle.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"feat-card reveal d1\">\n        <div class=\"feat-ico\"><i data-lucide=\"globe\"><\u002Fi><\u002Fdiv>\n        <h3 class=\"h3\">Status-Page<\u002Fh3>\n        <p>Öffentliche oder interne Status-Seite mit einem Klick. Zeige Uptime, laufende Vorfälle und geplante Wartungen transparent an.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"feat-card v reveal d2\">\n        <div class=\"feat-ico\"><i data-lucide=\"network\"><\u002Fi><\u002Fdiv>\n        <h3 class=\"h3\">Multi-Node<\u002Fh3>\n        <p>Überwache hunderte Nodes aus einem Dashboard. Leichtgewichtige Agents verbinden sich verschlüsselt mit deiner zentralen Instanz.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== SPLIT HIGHLIGHTS ===================== -->\n<section class=\"section-pad divider\">\n  <div class=\"container\">\n\n    <!-- Split 1: Alerting -->\n    <div class=\"split\">\n      <div class=\"split-text reveal\">\n        <span class=\"eyebrow\">Alerting<\u002Fspan>\n        <h2 class=\"h2\">Erfahre von Problemen, bevor deine Nutzer es tun<\u002Fh2>\n        <p class=\"lead\">Definiere präzise Regeln und lass Helio den Rest erledigen. Alarme landen dort, wo dein Team ohnehin schon ist.<\u002Fp>\n        <ul class=\"split-list\">\n          <li><span class=\"ci\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan><div><b>Flexible Kanäle<\u002Fb><span>Webhook, E-Mail, Slack, Discord, Telegram oder PagerDuty.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"ci\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan><div><b>Smarte Schwellwerte<\u002Fb><span>Eskalationsstufen, Ruhezeiten und automatisches Auto-Resolve.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"ci\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan><div><b>Kein Alarm-Spam<\u002Fb><span>Gruppierung &amp; Deduplizierung verhindern Benachrichtigungs-Fluten.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"split-visual reveal d2\">\n        <div class=\"panel\">\n          <div class=\"panel-head\">\n            <span class=\"pt\"><i data-lucide=\"bell-ring\"><\u002Fi>Alert-Verlauf<\u002Fspan>\n            <span class=\"badge\"><span class=\"dot dot-ok\"><\u002Fspan>3 aktiv<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"panel-body\">\n            <div class=\"alert-item down\">\n              <span class=\"ai-ico\"><i data-lucide=\"alert-octagon\"><\u002Fi><\u002Fspan>\n              <div class=\"ai-main\"><div class=\"ai-t\">cache-02 antwortet nicht<\u002Fdiv><div class=\"ai-d\">HTTP 503 · 3 Versuche fehlgeschlagen<\u002Fdiv><\u002Fdiv>\n              <span class=\"ai-time\">vor 2 min<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"alert-item warn\">\n              <span class=\"ai-ico\"><i data-lucide=\"alert-triangle\"><\u002Fi><\u002Fspan>\n              <div class=\"ai-main\"><div class=\"ai-t\">web-01 CPU &gt; 85 %<\u002Fdiv><div class=\"ai-d\">Schwellwert seit 4 min überschritten<\u002Fdiv><\u002Fdiv>\n              <span class=\"ai-time\">vor 6 min<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"alert-item ok\">\n              <span class=\"ai-ico\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>\n              <div class=\"ai-main\"><div class=\"ai-t\">db-primary wiederhergestellt<\u002Fdiv><div class=\"ai-d\">Latenz wieder im Normalbereich<\u002Fdiv><\u002Fdiv>\n              <span class=\"ai-time\">vor 18 min<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"chip-row\">\n              <span class=\"chip\"><i data-lucide=\"webhook\"><\u002Fi>Webhook<\u002Fspan>\n              <span class=\"chip\"><i data-lucide=\"mail\"><\u002Fi>E-Mail<\u002Fspan>\n              <span class=\"chip\"><i data-lucide=\"message-square\"><\u002Fi>Slack<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Split 2: Docker -->\n    <div class=\"split rev\">\n      <div class=\"split-text reveal\">\n        <span class=\"eyebrow\">Container<\u002Fspan>\n        <h2 class=\"h2\">Docker-Monitoring ohne Setup-Schmerzen<\u002Fh2>\n        <p class=\"lead\">Helio findet deine Container von selbst und beginnt sofort mit dem Sammeln von Metriken. Ein Befehl, fertig.<\u002Fp>\n        <ul class=\"split-list\">\n          <li><span class=\"ci\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan><div><b>Auto-Discovery<\u002Fb><span>Neue Container erscheinen automatisch im Dashboard.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"ci\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan><div><b>Pro-Container-Metriken<\u002Fb><span>CPU, RAM, Netzwerk-I/O und Restart-Counts je Service.<\u002Fspan><\u002Fdiv><\u002Fli>\n          <li><span class=\"ci\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan><div><b>Health-Checks &amp; Logs<\u002Fb><span>Live-Logs und Status direkt aus dem Dashboard.<\u002Fspan><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"split-visual reveal d2\">\n        <div class=\"panel\">\n          <div class=\"panel-head\">\n            <span class=\"pt\"><i data-lucide=\"terminal\"><\u002Fi>Schnellstart<\u002Fspan>\n            <span class=\"badge mono\">docker<\u002Fspan>\n          <\u002Fdiv>\n          <div cla v>\n        <p class=\"price-desc\">Für Teams mit Rollen, Audit-Logs und SSO-Anforderungen.<\u002Fp>\n        <div class=\"price-amt\"><span class=\"num\">€39<\u002Fspan><span class=\"per\">/ Monat<\u002Fspan><\u002Fdiv>\n        <a href=\"#start\" class=\"btn btn-secondary\">Vertrieb kontaktieren<\u002Fa>\n        <ul class=\"price-feats\">\n          <li><span class=\"ck\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>Alles aus Pro<\u002Fli>\n          <li><span class=\"ck\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>Rollen &amp; Berechtigungen<\u002Fli>\n          <li><span class=\"ck\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>SSO (SAML / OIDC)<\u002Fli>\n          <li><span class=\"ck\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>Audit-Logs<\u002Fli>\n          <li><span class=\"ck\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>SLA &amp; dedizierter Support<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FAQ ===================== -->\n<section class=\"section-pad divider\" id=\"docs\">\n  <div class=\"container\">\n    <div class=\"section-head center\">\n      <span class=\"eyebrow reveal\">FAQ<\u002Fspan>\n      <h2 class=\"h2 reveal d1\">Häufige Fragen<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq reveal d1\">\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">Muss ich Helio wirklich selbst hosten?<span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Ja — und genau das ist der Punkt. Helio läuft vollständig auf deiner eigenen Infrastruktur, sodass deine Metriken niemals einen fremden Server erreichen. Du brauchst nur Docker oder ein einzelnes Binary; eine externe Datenbank ist nicht erforderlich.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">Wie unterscheidet sich Helio von Grafana oder Uptime Kuma?<span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Helio kombiniert Metrik-Erfassung, Alerting und Status-Pages in einem einzigen Tool — ohne dass du Prometheus, Grafana und einen Uptime-Checker separat betreiben und verbinden musst. Der Fokus liegt auf einfacher Einrichtung und einem schlanken Footprint von rund 42 MB RAM.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">Welche Systeme und Plattformen werden unterstützt?<span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Linux (x86-64 &amp; ARM, inkl. Raspberry Pi), Docker und Kubernetes. Agents laufen auf praktisch jedem Host; das Dashboard funktioniert in jedem modernen Browser. macOS- und Windows-Hosts werden über den Agent ebenfalls überwacht.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">Ist Helio wirklich Open Source?<span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Ja. Der Kern von Helio steht unter der Apache-2.0-Lizenz und ist vollständig auf GitHub einsehbar. Die kostenpflichtigen Pläne fügen lediglich gehostete Komfortfunktionen und Team-Features hinzu — die self-hosted Variante bleibt für immer frei.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">Wie funktioniert das Alerting genau?<span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Du definierst Regeln auf Basis von Schwellwerten oder Ausfällen und ordnest ihnen Kanäle zu — Webhook, E-Mail, Slack, Discord, Telegram oder PagerDuty. Eskalationsstufen, Ruhezeiten und automatisches Auto-Resolve sind eingebaut, und Alarme werden gruppiert, um Benachrichtigungs-Spam zu vermeiden.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">Kann ich von einem anderen Tool migrieren?<span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">In den meisten Fällen ja. Helio importiert Prometheus-kompatible Metriken und kann bestehende Uptime-Checks übernehmen. Unsere Docs enthalten Schritt-für-Schritt-Anleitungen für die gängigsten Setups.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FINAL CTA ===================== -->\n<section class=\"section-pad cta\" id=\"start\">\n  <div class=\"container\">\n    <div class=\"cta-box reveal\">\n      <span class=\"eyebrow\" style=\"justify-content:center\">Loslegen<\u002Fspan>\n      <h2 class=\"h2\" style=\"margin-top:14px\">In 60 Sekunden live<\u002Fh2>\n      <p class=\"lead\">Ein Befehl genügt. Kein Account, keine Kreditkarte, keine Cloud. Starte Helio jetzt auf deinem eigenen Server.<\u002Fp>\n      <div class=\"cta-actions\">\n        <a href=\"#\" class=\"btn btn-primary btn-lg\">Kostenlos hosten<\u002Fa>\n        <a href=\"#docs\" class=\"btn btn-secondary btn-lg\"><i data-lucide=\"book-open\"><\u002Fi>Zur Dokumentation<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"code-snip\">\n        <code><span class=\"pr\">$<\u002Fspan> curl -fsSL helio.sh/install | sh<\u002Fcode>\n        <button class=\"copy-btn\" data-copy=\"curl -fsSL helio.sh/install | sh\" aria-label=\"Befehl kopieren\">\n          <i data-lucide=\"copy\" class=\"ic-copy\"><\u002Fi>\n          <i data-lucide=\"check\" class=\"ic-check\"><\u002Fi>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ===================== FOOTER ===================== -->\n<footer class=\"footer\" id=\"github\">\n
